<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: #1e293b; padding: 40px; border-radius: 16px; width: 360px; text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}
.login-box h1 { color: #e2e8f0; font-size: 24px; margin-bottom: 8px; }
.login-box p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
.input-group { margin-bottom: 16px; text-align: left; }
.input-group label { color: #cbd5e1; font-size: 13px; display: block; margin-bottom: 6px; }
.input-group input {
  width: 100%; padding: 12px 14px; border: 2px solid #334155; border-radius: 10px;
  background: #0f172a; color: #e2e8f0; font-size: 16px; outline: none; transition: 0.2s;
}
.input-group input:focus { border-color: #3b82f6; }
.btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: 0.2s;
}
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.error { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>🔐 Evolution Dashboard</h1>
  <p>Enter PIN to access</p>
  <form id="loginForm">
    <div class="input-group">
      <label>PIN</label>
      <input type="password" id="pin" placeholder="Enter PIN" maxlength="10" autofocus>
    </div>
    <button type="submit" class="btn btn-primary">Unlock</button>
    <div class="error" id="errorMsg">Invalid PIN</div>
  </form>
</div>
<script>
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin: document.getElementById('pin').value })
  });
  const data = await res.json();
  if (data.success) window.location.href = '/';
  else document.getElementById('errorMsg').style.display = 'block';
};
</script>
</body>
</html>
